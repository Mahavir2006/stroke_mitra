name: stroke_mitra
description: AI-Powered Stroke Screening App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^12.1.1
  flutter_riverpod: ^2.4.9
  flutter_animate: ^4.2.0
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.9.0
  sensors_plus: ^4.0.2
  record: ^5.0.0
  path_provider: ^2.1.1
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
