name: stroke_mitra
description: "Stroke Mitra — AI-Powered Stroke Screening App. Detect stroke early, save lives."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.4.9

  # Animations
  flutter_animate: ^4.3.0

  # Camera & Face Detection
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.9.0

  # Motion sensing
  sensors_plus: ^4.0.2

  # Audio recording
  record: ^5.0.4
  audioplayers: ^5.2.1
  path_provider: ^2.1.2

  # HTTP & networking
  http: ^1.2.0

  # UI utilities
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.2
  google_fonts: ^6.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # Environment
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
